let originalSetTimeout = window.setTimeout;
let originalClearTimeout = window.clearTimeout;
let originalRequestAnimationFrame = window.requestAnimationFrame;
let originalCancelAnimationFrame = window.cancelAnimationFrame;

function createImmediateCallback(callback, args = []) {
  if (window.MessageChannel) {
    let channel = new MessageChannel();
    channel.port2.onmessage = function () {
      callback(...args);
    };
    channel.port1.postMessage(null);
    return;
  }

  if (window.postMessage) {
    let messageKey = 'immediate_callback_' + Math.random();
    function messageHandler(event) {
      if (event.data === messageKey) {
        window.removeEventListener('message', messageHandler);
        callback(...args);
      }
    }
    window.addEventListener('message', messageHandler);
    window.postMessage(messageKey, '*');
    return;
  }

  callback(...args);
}

window.setTimeout = function (callback, delay, ...args) {
  if (delay === 0 || delay === undefined || delay === null) {
    createImmediateCallback(callback, args);
    return Math.floor(Math.random() * 1000000);
  }
  return originalSetTimeout.call(window, callback, delay, ...args);
};

window.clearTimeout = function (id) {
  if (typeof id === 'number' && id < 1000000) {
    return originalClearTimeout.call(window, id);
  }
};

let rafIdCounter = 1000000;
window.requestAnimationFrame = function (callback) {
  createImmediateCallback(callback, [performance.now()]);
  return rafIdCounter++;
};

window.cancelAnimationFrame = function (id) {
};

var canvasElement = document.getElementById('canvas');
var isFullscreen = false;

canvasElement.addEventListener('webglcontextlost', (e) => {
  if (!DefconLoader.hasEverLoaded) {
    DefconLoader.showError('WebGL context lost. Please reload the page.');
  }
  e.preventDefault();
}, false);

function onFullscreenChange() {
  isFullscreen = !!(document.fullscreenElement ||
    document.webkitFullscreenElement ||
    document.mozFullScreenElement ||
    document.msFullscreenElement);

  if (isFullscreen) {
    canvasElement.focus();
  } else {
    setTimeout(() => {
      canvasElement.focus();
      canvasElement.getBoundingClientRect();
      window.dispatchEvent(new Event('resize'));
    }, 100);
  }
}

document.addEventListener('fullscreenchange', onFullscreenChange);
document.addEventListener('webkitfullscreenchange', onFullscreenChange);
document.addEventListener('mozfullscreenchange', onFullscreenChange);
document.addEventListener('MSFullscreenChange', onFullscreenChange);

canvasElement.addEventListener('click', function (e) {
  if (!isFullscreen) {
    var requestFullscreen = canvasElement.requestFullscreen ||
      canvasElement.webkitRequestFullscreen ||
      canvasElement.mozRequestFullScreen ||
      canvasElement.msRequestFullscreen;

    if (requestFullscreen) {
      requestFullscreen.call(canvasElement);
    }
  }

  e.preventDefault();
  return false;
});

canvasElement.addEventListener('mousedown', function (e) {
  canvasElement.focus();
});

document.addEventListener('keydown', function (e) {
  if (e.key === 'Escape' && isFullscreen) {
    var exitFullscreen = document.exitFullscreen ||
      document.webkitExitFullscreen ||
      document.mozCancelFullScreen ||
      document.msExitFullscreen;

    if (exitFullscreen) {
      exitFullscreen.call(document);
    }
  }
});

var DefconLoader = {
  overlay: document.getElementById('loading-overlay'),
  statusElement: document.getElementById('loading-status'),
  progressBar: document.getElementById('progress-bar'),
  progressBar2: document.getElementById('progress-bar-2'),
  detailsElement: document.getElementById('loading-details'),
  infoElement: document.getElementById('loading-info'),
  
  STATE_DISCONNECTED: 0,
  STATE_CONNECTING: 1,
  STATE_CONNECTED: 2,
  STATE_ERROR: 3,
  
  currentState: 1,
  maxUpdatesRemaining: 0,
  
  hasEverLoaded: false,
  assetsLoaded: false,
  gameInitialized: false,
  errorOccurred: false,
  
  lastProgressTime: Date.now(),
  lastDependencyCount: -1,
  noProgressTimeout: null,
  maxNoProgressTime: 60000,

  init: function () {
    this.setConnectionState(this.STATE_CONNECTING);
    this.infoElement.textContent = 'ESTABLISHING CONNECTION...';
    this.startProgressMonitoring();
  },

  startProgressMonitoring: function() {
    this.updateProgressMonitor();
  },

  updateProgressMonitor: function() {
    if (this.noProgressTimeout) {
      clearTimeout(this.noProgressTimeout);
    }

    this.noProgressTimeout = setTimeout(() => {
      if (!this.hasEverLoaded && !this.errorOccurred) {
        this.showError('NO PROGRESS - CHECK CONNECTION');
      }
    }, this.maxNoProgressTime);
  },

  setConnectionState: function (state) {
    this.currentState = state;
    const statusEl = this.statusElement;

    statusEl.classList.remove('state-disconnected', 'state-connecting', 'state-connected', 'state-error');

    switch (state) {
      case this.STATE_DISCONNECTED:
        statusEl.textContent = 'DISCONNECTED';
        statusEl.classList.add('state-disconnected');
        this.updateProgressBar(0, '#ff0000');
        break;

      case this.STATE_CONNECTING:
        statusEl.textContent = 'CONNECTING';
        statusEl.classList.add('state-connecting');
        this.updateProgressBar(50, '#ffff00');
        break;

      case this.STATE_CONNECTED:
        statusEl.textContent = 'CONNECTED';
        statusEl.classList.add('state-connected');
        this.updateProgressBar(100, '#00ff00');
        break;

      case this.STATE_ERROR:
        statusEl.textContent = 'ERROR';
        statusEl.classList.add('state-error');
        this.updateProgressBar(0, '#ff0000');
        break;
    }
  },

  showError: function(message) {
    if (this.hasEverLoaded) {
      return;
    }
    
    this.errorOccurred = true;
    this.setConnectionState(this.STATE_ERROR);
    this.infoElement.textContent = message;
    this.detailsElement.textContent = 'ERROR OCCURRED';
    this.updateSecondaryProgress(0, '#ff0000', 'ERROR');
    
    if (this.noProgressTimeout) {
      clearTimeout(this.noProgressTimeout);
      this.noProgressTimeout = null;
    }
  },

  updateProgressBar: function (percent, color) {
    if (this.progressBar) {
      this.progressBar.style.width = percent + '%';
      this.progressBar.style.backgroundColor = color;
    }
  },

  updateSecondaryProgress: function (percent, color, text) {
    if (this.progressBar2) {
      this.progressBar2.style.width = percent + '%';
      this.progressBar2.style.backgroundColor = color;
    }
    if (text && this.detailsElement) {
      this.detailsElement.textContent = text;
    }
  },

  updateSyncStatus: function (remaining, maxRemaining) {
    if (remaining !== this.lastDependencyCount) {
      this.lastDependencyCount = remaining;
      this.lastProgressTime = Date.now();
      this.updateProgressMonitor();
    }

    if (remaining > maxRemaining) {
      this.maxUpdatesRemaining = remaining;
    }

    let fraction = 0;
    if (this.maxUpdatesRemaining > 0) {
      fraction = remaining / this.maxUpdatesRemaining;
    }
    fraction = Math.max(0, Math.min(1, 1 - fraction));

    const red = Math.floor((1 - fraction) * 255);
    const green = Math.floor(fraction * 255);
    const color = `rgb(${red}, ${green}, 0)`;
    const text = remaining > 5 ? 'RECEIVING' : 'RECEIVED';
    this.updateSecondaryProgress(fraction * 100, color, text);
  },

  hide: function () {
    if (this.hasEverLoaded || this.errorOccurred) {
      return;
    }

    console.log('Hiding loading screen permanently');
    this.hasEverLoaded = true;
    
    // Clear any timeouts
    if (this.noProgressTimeout) {
      clearTimeout(this.noProgressTimeout);
      this.noProgressTimeout = null;
    }

    if (this.overlay) {
      this.overlay.classList.add('hidden');
      this.overlay.style.display = 'none';
      
      setTimeout(() => {
        if (this.overlay && !this.overlay.classList.contains('hidden')) {
          console.log('Loading screen reappeared - forcing hide again');
          this.overlay.classList.add('hidden');
          this.overlay.style.display = 'none';
        }
      }, 2000);
    }
  },
  
  forceHide: function() {
    console.log('Force hiding loading screen');
    this.hasEverLoaded = true;
    this.errorOccurred = false;
    
    if (this.noProgressTimeout) {
      clearTimeout(this.noProgressTimeout);
      this.noProgressTimeout = null;
    }
    
    if (this.overlay) {
      this.overlay.classList.add('hidden');
      this.overlay.style.display = 'none';
    }
  }
};

var Module = {
  canvas: canvasElement,
  
  setStatus(text) {
    if (text && !DefconLoader.hasEverLoaded) {
      DefconLoader.infoElement.textContent = text.toUpperCase();
    }
  },
  
  totalDependencies: 0,
  dataFileLoaded: false,
  jsReady: false,
  
  checkIfFullyLoaded() {
    if (this.jsReady && this.dataFileLoaded && DefconLoader) {
      console.log('All assets loaded (JS + Data), hiding loading screen');
      DefconLoader.setConnectionState(DefconLoader.STATE_CONNECTED);
      DefconLoader.updateSecondaryProgress(100, '#00ff00', 'READY');
      DefconLoader.infoElement.textContent = 'GAME READY - STARTING...';
      
      setTimeout(() => {
        DefconLoader.hide();
      }, 1500);
    }
  },
  
  monitorRunDependencies(left) {
    if (DefconLoader.hasEverLoaded) {
      return;
    }

    this.totalDependencies = Math.max(this.totalDependencies, left);

    if (left > 0) {
      DefconLoader.setConnectionState(DefconLoader.STATE_CONNECTING);
      DefconLoader.updateSyncStatus(left, this.totalDependencies);
      DefconLoader.infoElement.textContent = `DOWNLOADING... (${this.totalDependencies - left}/${this.totalDependencies})`;

      const connectProgress = 50 + (((this.totalDependencies - left) / this.totalDependencies) * 50);
      DefconLoader.updateProgressBar(connectProgress, '#ffff00');

    } else {
      console.log('JS dependencies completed, waiting for .data file...');
      this.jsReady = true;
      DefconLoader.setConnectionState(DefconLoader.STATE_CONNECTED);
      DefconLoader.updateProgressBar(100, '#00ff00');
      DefconLoader.infoElement.textContent = 'WAITING FOR GAME DATA...';
      
      this.checkIfFullyLoaded();
    }
  },
  
  requestFullscreen: function (lockPointer, resizeCanvas) {
    if (!isFullscreen) {
      var requestFullscreen = canvasElement.requestFullscreen ||
        canvasElement.webkitRequestFullscreen ||
        canvasElement.mozRequestFullScreen ||
        canvasElement.msRequestFullscreen;

      if (requestFullscreen) {
        requestFullscreen.call(canvasElement);
      }
    }
  }
};

if ('serviceWorker' in navigator) {

    registration.update();
    
    if (registration.waiting) {
      registration.waiting.postMessage({ type: 'SKIP_WAITING' });
    }
    
    registration.addEventListener('updatefound', () => {
      const newWorker = registration.installing;
      
      newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'installed') {
          if (navigator.serviceWorker.controller) {
            newWorker.postMessage({ type: 'SKIP_WAITING' });
          }
        }
      });
    });
    
    setInterval(() => {
      registration.update().catch(err => {
        console.warn('Service Worker update failed:', err);
      });
    }, 30000);
    
  }).catch(error => {
    console.warn('Service Worker registration failed:', error);
  });
}

DefconLoader.init();

const originalXHROpen = XMLHttpRequest.prototype.open;
XMLHttpRequest.prototype.open = function(method, url, ...args) {
  if (url.includes('.data')) {
    console.log('Detected .data file request:', url);
    
    this.addEventListener('progress', (event) => {
      if (event.lengthComputable && DefconLoader) {
        const percent = (event.loaded / event.total) * 100;
        console.log(`.data file progress: ${percent.toFixed(1)}%`);
        
        DefconLoader.updateSecondaryProgress(
          percent, 
          percent < 100 ? '#ffaa00' : '#00ff00',
          percent < 100 ? 'LOADING ASSETS' : 'ASSETS LOADED'
        );
        DefconLoader.infoElement.textContent = 
          `DOWNLOADING GAME DATA... (${Math.round(percent)}%)`;
      }
    });
    
    this.addEventListener('load', () => {
      console.log('.data file download completed');
      Module.dataFileLoaded = true;
      if (DefconLoader) {
        DefconLoader.updateSecondaryProgress(100, '#00ff00', 'ASSETS LOADED');
        DefconLoader.infoElement.textContent = 'GAME DATA LOADED - CHECKING...';
      }
      Module.checkIfFullyLoaded();
    });
    
    this.addEventListener('error', () => {
      console.error('.data file failed to load');
      if (DefconLoader) {
        DefconLoader.showError('ASSET LOADING FAILED');
      }
    });
  }
  
  return originalXHROpen.call(this, method, url, ...args);
};

window.onerror = (event, source, lineno, colno, error) => {

let gameInitCheckInterval;
let lastCanvasImageData = null;

function startGameInitDetection() {
  if (gameInitCheckInterval) return;
  
  console.log('Starting game initialization detection...');
  gameInitCheckInterval = setInterval(() => {
    if (DefconLoader.hasEverLoaded) {
      clearInterval(gameInitCheckInterval);
      return;
    }
    
    try {
      const canvas = document.getElementById('canvas');
      if (!canvas || canvas.width === 0 || canvas.height === 0) {
        return;
      }
      
      const ctx = canvas.getContext('2d');
      if (ctx) {
        const imageData = ctx.getImageData(0, 0, Math.min(canvas.width, 100), Math.min(canvas.height, 100));
        const currentData = imageData.data;
        
        let hasNonBlackPixels = false;
        for (let i = 0; i < currentData.length; i += 4) {
          const r = currentData[i];
          const g = currentData[i + 1];
          const b = currentData[i + 2];
          const a = currentData[i + 3];
          
          if (a > 0 && (r > 10 || g > 10 || b > 10)) {
            hasNonBlackPixels = true;
            break;
          }
        }
        
        if (hasNonBlackPixels) {
          console.log('Game appears to be rendering - forcing loading screen to hide');
          DefconLoader.forceHide();
          clearInterval(gameInitCheckInterval);
          return;
        }
      }
      
      const gl = canvas.getContext('webgl') || canvas.getContext('webgl2');
      if (gl) {
        const pixels = new Uint8Array(4);
        gl.readPixels(0, 0, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, pixels);
        
        if (pixels[0] > 0 || pixels[1] > 0 || pixels[2] > 0 || pixels[3] > 0) {
          console.log('WebGL rendering detected - forcing loading screen to hide');
          DefconLoader.forceHide();
          clearInterval(gameInitCheckInterval);
          return;
        }
      }
      
    } catch (error) {
    }
  }, 1000);
}

setTimeout(startGameInitDetection, 3000);

document.addEventListener('keydown', function(e) {

    if (gameInitCheckInterval) {
      clearInterval(gameInitCheckInterval);
    }
  }
});
