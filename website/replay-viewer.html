<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>DEFCON Replay Viewer</title>
    <style>
body {
  margin: 0;
  padding: 0;
  background-color: black;
  overflow: hidden;
}

canvas {
  display: block;
  width: 100vw;
  height: 100vh;
  border: none;
  background-color: black;
  cursor: pointer;
}

/* Fullscreen styles */
canvas:fullscreen {
  cursor: none;
}

canvas:-webkit-full-screen {
  cursor: none;
}

canvas:-moz-full-screen {
  cursor: none;
}

canvas:-ms-fullscreen {
  cursor: none;
}
    </style>
  </head>
  <body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>

    <script type='text/javascript'>
      var canvasElement = document.getElementById('canvas');
      var isFullscreen = false;

      // WebGL context lost handler
      canvasElement.addEventListener('webglcontextlost', (e) => {
        alert('WebGL context lost. You will need to reload the page.');
        e.preventDefault();
      }, false);

      // Fullscreen change event handlers for all browsers
      function onFullscreenChange() {
        isFullscreen = !!(document.fullscreenElement || 
                         document.webkitFullscreenElement || 
                         document.mozFullScreenElement || 
                         document.msFullscreenElement);
        
        console.log('Fullscreen state changed:', isFullscreen);
        
        // Ensure canvas maintains focus
        if (isFullscreen) {
          canvasElement.focus();
        } else {
          // Small delay to ensure the canvas is ready for interaction again
          setTimeout(() => {
            canvasElement.focus();
          }, 100);
        }
      }

      // Add fullscreen change listeners for all browsers
      document.addEventListener('fullscreenchange', onFullscreenChange);
      document.addEventListener('webkitfullscreenchange', onFullscreenChange);
      document.addEventListener('mozfullscreenchange', onFullscreenChange);
      document.addEventListener('MSFullscreenChange', onFullscreenChange);

      // Canvas click handler for fullscreen toggle
      canvasElement.addEventListener('click', function(e) {
        console.log('Canvas clicked, current fullscreen state:', isFullscreen);
        
        if (!isFullscreen) {
          // Request fullscreen
          var requestFullscreen = canvasElement.requestFullscreen || 
                                 canvasElement.webkitRequestFullscreen || 
                                 canvasElement.mozRequestFullScreen || 
                                 canvasElement.msRequestFullscreen;
          
          if (requestFullscreen) {
            requestFullscreen.call(canvasElement).then(() => {
              console.log('Fullscreen request successful');
            }).catch((err) => {
              console.error('Fullscreen request failed:', err);
            });
          }
        }
        
        e.preventDefault();
        return false;
      });

      // Ensure canvas can receive focus
      canvasElement.addEventListener('mousedown', function(e) {
        canvasElement.focus();
      });

      // Handle escape key for manual fullscreen exit (backup)
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && isFullscreen) {
          console.log('Escape pressed, exiting fullscreen');
          var exitFullscreen = document.exitFullscreen || 
                              document.webkitExitFullscreen || 
                              document.mozCancelFullScreen || 
                              document.msExitFullscreen;
          
          if (exitFullscreen) {
            exitFullscreen.call(document);
          }
        }
      });

      var Module = {
        print(...args) {
          console.log(...args);
        },
        canvas: canvasElement,
        setStatus(text) {
        },
        totalDependencies: 0,
        monitorRunDependencies(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
        },
        // Override Emscripten's fullscreen handling
        requestFullscreen: function(lockPointer, resizeCanvas) {
          console.log('Module.requestFullscreen called');
          if (!isFullscreen) {
            canvasElement.click(); // Trigger our custom fullscreen handler
          }
        }
      };
      
      Module.setStatus('Downloading...');
      
      window.onerror = (event) => {
        Module.setStatus('Exception thrown, see JavaScript console');
        Module.setStatus = (text) => {
          if (text) console.error('[post-exception status] ' + text);
        };
      };

      // Initial focus setup
      window.addEventListener('load', function() {
        canvasElement.focus();
      });
    </script>
    <script async type="text/javascript" src="defcon.js"></script>
  </body>
</html>
