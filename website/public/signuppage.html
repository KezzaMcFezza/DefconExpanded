<!DOCTYPE html>
<html lang="en" class="hide-scrollbar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up page</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/x-icon" href="https://defconexpanded.com/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="https://defconexpanded.com/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://defconexpanded.com/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="https://defconexpanded.com/favicon-96x96.png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://defconexpanded.com/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="https://defconexpanded.com/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="https://defconexpanded.com/android-chrome-512x512.png">
    <link rel="stylesheet" type="text/css" href="/CSS/newmain.css" />
    <link rel="stylesheet" type="text/css" href="/CSS/scaling.css" />
    <link rel="stylesheet" type="text/css" href="/CSS/useraccounts.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
    <script type="module" src="/javaScript/main/navbar.js" defer></script>
    <script type="module" src="/javaScript/main/main.js" defer></script>
    <style>
        .fa-user {
            margin-right: 5px;
        }

        .fa-cog {
            margin-right: 5px;
        }
    </style>
</head>

<body class="hide-scrollbar">
    <main>
        <div class="login-container">
            <form id="signupForm" action="">
                <div class="headingsContainer">
                    <h3>Sign up</h3>
                    <p>Sign up to manage your leaderboard profile, report issues on the page, request mod uploads on the mod-list
                        and even request to upload your defcon demo!</p>
                </div>

                <div class="mainContainer">
                    <div class="user-alias">
                        <input type="text" id="username" placeholder="Enter Username" name="username"
                            style="margin: 0px 10px 0px 0px;" required>
                    </div>
                    <br>
                    <br>
                    <label for="password">Your password</label>
                    <input type="password" id="password" placeholder="Enter Password" name="pswrd" required>
                    <br>
                    <br>
                    <label for="email">Email address</label>
                    <input type="text" id="email" placeholder="Enter Email" name="email" required>
                    <br>
                    <p class="forgot-password"> <a href="/privacypolicy" target="_blank">Read our privacy policy</a></p>
                    <br>
                    <button type="submit">Sign up</button>
                </div>
            </form>
        </div>
    </main>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, email, password }),
                });

                const data = await response.json();

                if (response.ok) {
                    alert(data.message);
                } else {
                    alert(data.error);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred during signup');
            }
        });
    </script>
</body>

</html>
