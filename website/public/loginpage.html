<!DOCTYPE html>
<html lang="en" class="hide-scrollbar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/x-icon" href="https://defconexpanded.com/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="https://defconexpanded.com/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://defconexpanded.com/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="https://defconexpanded.com/favicon-96x96.png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://defconexpanded.com/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="https://defconexpanded.com/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="https://defconexpanded.com/android-chrome-512x512.png">
    <link rel="stylesheet" type="text/css" href="/css/newmain.css" />
    <link rel="stylesheet" type="text/css" href="/css/scaling.css" />
    <link rel="stylesheet" type="text/css" href="/css/useraccounts.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
    <script type="module" src="/javaScript/main/navbar.js" defer></script>
    <script type="module" src="/javaScript/main/main.js" defer></script>
    <style>
        .fa-user {
            margin-right: 5px;
        }

        .fa-cog {
            margin-right: 5px;
        }
    </style>
</head>

<body class="hide-scrollbar">
    <main>
        <div class="login-container">
            <form id="loginForm" action="">
                <div class="headingsContainer">
                    <h3>Sign in</h3>
                    <p>Sign in with your username and password</p>
                </div>

                <div class="mainContainer">
                    <label for="username">Your username</label>
                    <input type="text" id="username" placeholder="Enter Username" name="username" required>
                    <br>
                    <br>
                    <label for="password">Your password</label>
                    <input type="password" id="password" placeholder="Enter Password" name="password" required>
                    <div class="subcontainer">
                        <label>
                            <input type="checkbox" name="remember"> Remember me
                        </label>
                        <p class="forgot-password"> <a href="/forgotpassword">Forgot Password?</a></p>
                    </div>
                    <button type="submit">Login</button>
                    <p class="error-message" id="error-message" style="display: none;">Invalid login credentials</p>
                </div>
            </form>
        </div>
    </main>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.querySelector('input[name="remember"]').checked;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password, rememberMe })
                });

                const data = await response.json();

                if (response.ok) {
                    window.location.href = '/homepage';
                } else {
                    document.getElementById('error-message').style.display = 'block';
                    document.getElementById('error-message').textContent = data.error;
                }
            } catch (error) {
                console.error('Error:', error);
                var message = document.getElementById('error-message');
                message.style.display = 'block';
                message.style.color = 'red';
                message.textContent = 'An error occurred. Please try again.';
            }
        });
    </script>
</body>

</html>
