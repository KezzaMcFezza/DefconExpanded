<!DOCTYPE html>
<html lang="en" class="hide-scrollbar">

<head>
    <script type="module" src="/javaScript/admin/admin-main.js"></script>
    <script type="module" src="/javaScript/main/main.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEFCON Expanded: RCON Console</title>
    <meta name="robots" content="noindex">
    <link rel="stylesheet" type="text/css" href="/css/newmain.css">
    <link rel="stylesheet" type="text/css" href="/css/scaling.css">
    <link rel="stylesheet" type="text/css" href="/css/admin.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&amp;display=swap" rel="stylesheet">
</head>
<style>
    main {
        margin-left: 320px;
        padding-top: 0;
    }

    [data-permission] {
        display: none;
    }

    h1 {
        color: #ffffff;
        font-size: 16px;
        font-weight: normal;
        margin: 0 0 10px 0;
        padding: 0;
    }

    #rcon-container {
        display: flex;
        height: calc(100vh - 100px);
        padding: 1rem;
        gap: 1rem;
    }

    #server-list-panel {
        background-color: rgba(28, 28, 46, 0.2);
        border: 1px solid #3a3a3a;
        padding: 1rem;
        border-radius: 10px;
        width: 280px;
        overflow-y: scroll;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        position: relative;
    }

    #server-list-panel::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(to right, #4da6ff, #5eff00);
        opacity: 0.7;
    }

    #server-list {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    #server-list li {
        padding: 8px 10px;
        margin-bottom: 5px;
        background-color: rgba(28, 28, 46, 0.4);
        border: 1px solid #3a3a3a;
        color: #b8b8b8;
        cursor: pointer;
        border-radius: 3px;
        font-family: 'Roboto', Arial, sans-serif;
        font-size: 13px;
        transition: background-color 0.2s;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    #server-list li:hover {
        background-color: rgba(28, 28, 46, 0.6);
    }

    #server-list li.active {
        background-color: rgba(0, 103, 184, 0.5);
        border-color: #0066cc;
        color: white;
    }

    #server-list li.manual-connection {
        background-color: #333333;
        border-color: #444444;
        font-weight: bold;
        margin-bottom: 15px;
    }

    #server-list-title {
        color: #4da6ff;
        font-size: 1.2rem;
        margin-bottom: 1rem;
        font-family: 'Orbitron', sans-serif;
        text-transform: uppercase;
        letter-spacing: 1px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding-bottom: 5px;
    }

    #console-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    #connection-panel {
        background-color: rgba(28, 28, 46, 0.2);
        border: 1px solid #3a3a3a;
        padding: 1rem;
        overflow-y: auto;
        margin-bottom: 1rem;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        position: relative;
    }

    #connection-panel::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(to right, #ff8400, #ffcc00);
        opacity: 0.7;
    }

    #connection-controls {
        display: flex;
        align-items: center;
        margin-bottom: 10px;
    }

    #connection-controls button {
        margin-right: 10px;
        background-color: #0067b8;
        border: none;
        color: #ffffff;
        cursor: pointer;
        font-family: 'Roboto', Arial, sans-serif;
        padding: 8px 15px;
        border-radius: 5px;
        transition: background-color 0.3s;
    }

    #connection-controls button:hover {
        background-color: #3a8ad6;
    }

    #disconnect-btn {
        background-color: #830000 !important;
    }

    #disconnect-btn:hover {
        background-color: #b30000 !important;
    }

    #connection-status-container {
        display: flex;
        align-items: center;
        margin-left: 10px;
    }

    .status-label {
        color: #b8b8b8;
        font-family: 'Roboto', Arial, sans-serif;
        margin-right: 10px;
    }

    .form-row {
        display: flex;
        margin-bottom: 0.5rem;
        align-items: center;
    }

    .form-row label {
        width: 100px;
        color: #b8b8b8;
        font-family: 'Roboto', Arial, sans-serif;
    }

    .form-row input {
        flex: 1;
        background-color: rgba(28, 28, 46, 0.6);
        border: 1px solid #3a3a3a;
        color: #ffffff;
        padding: 5px 10px;
        font-family: 'Roboto', Arial, sans-serif;
        border-radius: 4px;
    }

    .log-streams-container {
        display: flex;
        align-items: center;
        margin-top: 10px;
    }

    .log-streams-container label {
        color: #b8b8b8;
        font-family: 'Roboto', Arial, sans-serif;
        margin-right: 15px;
    }

    #connection-form {
        display: none; /* Hidden by default */
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    #console-output {
        flex: 1;
        background-color: #0c0c0c;
        border: 1px solid #3a3a3a;
        padding: 1rem;
        overflow-y: auto;
        font-family: 'Consolas', 'Courier New', monospace;
        color: #b8b8b8;
        margin-bottom: 1rem;
        white-space: pre-wrap;
        word-wrap: break-word;
        border-radius: 5px;
    }

    #command-input {
        display: flex;
    }

    #command-input input {
        flex: 1;
        background-color: rgba(28, 28, 46, 0.6);
        border: 1px solid #3a3a3a;
        color: #ffffff;
        padding: 8px 10px;
        font-family: 'Consolas', 'Courier New', monospace;
        border-radius: 4px 0 0 4px;
    }

    #command-input button {
        margin-left: 0;
        background-color: #0067b8;
        border: none;
        color: #ffffff;
        cursor: pointer;
        font-family: 'Roboto', Arial, sans-serif;
        padding: 8px 15px;
        border-radius: 0 4px 4px 0;
        transition: background-color 0.3s;
    }

    #command-input button:hover {
        background-color: #3a8ad6;
    }

    .status-connected {
        color: #5eff00;
        font-weight: bold;
    }

    .status-disconnected {
        color: #ff4949;
        font-weight: bold;
    }

    .error-message {
        color: #ff6b6b;
    }

    .success-message {
        color: #5eff00;
    }

    .system-message {
        color: #ffcc00;
    }

    .console-prompt {
        color: #4da6ff;
    }

    .console-response {
        color: #b8b8b8;
    }

    ::-webkit-scrollbar {
        width: 8px;
    }

    ::-webkit-scrollbar-track {
        background: #1a1a1a;
        border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
        background: #444;
    }

    .log-event {
        color: #00aaff;
        font-family: 'Consolas', 'Courier New', monospace;
    }

    .log-server {
        color: #ff8400;
        font-family: 'Consolas', 'Courier New', monospace;
    }

    @media (max-width: 768px) {
        #sidebar .title::after {
            cursor: pointer;
            padding: 0px 0px 65px 0px;
            display: block;
        }
        
        #rcon-container {
            flex-direction: column;
        }
        
        #server-list-panel {
            width: 100%;
            height: 200px;
        }
    }

    #sidebar .list-items li a i {
        margin-right: 0.7rem !important;
    }
</style>

<body class="hide-scrollbar">
    <div class="container">
        <div id="sidebar">
            <div class="title">DEFCON Expanded</div>
            <ul class="list-items">
                <li><a href="/" id="nav-home"><i class="fas fa-home"></i>Back to Homepage</a></li>
                <li data-permission="PAGE_ADMIN_PANEL"><a href="/adminpanel" id="nav-whitelist"><i class="fab fa-windows"></i>Admin
                        Panel</a>
                </li>
                <li data-permission="PAGE_BLACKLIST_MANAGE"><a href="/leaderboardblacklistmanage" id="nav-blaclist"><i
                            class="fas fa-ban"></i>Blacklist Managment</a></li>
                <li data-permission="PAGE_DEMO_MANAGE"><a href="/demomanage" id="nav-demomanage"><i
                            class="fas fa-video"></i>Demo Managment</a></li>
                <li data-permission="PAGE_PLAYER_LOOKUP"><a href="/playerlookup" id="nav-playerlookup"><i
                            class="fa-solid fa-magnifying-glass"></i>Player Search</a></li>
                <li data-permission="PAGE_DEDCON_MANAGEMENT"><a href="/dedconmanagment" id="nav-dedconmanagment"><i
                            class="fas fa-radiation"></i>Dedcon Managment</a></li>
                <li data-permission="PAGE_MODLIST_MANAGE"><a href="/modlistmanage" id="nav-modmanage"><i
                            class="fas fa-list"></i>Modlist Managment</a></li>
                <li data-permission="PAGE_ACCOUNT_MANAGE"><a href="/accountmanage" id="nav-accountmanage"><i
                            class="fas fa-user"></i>Account Managment</a></li>
                <li data-permission="PAGE_SERVER_CONSOLE"><a href="/serverconsole" id="nav-console"><i
                            class="fas fa-laptop-code"></i>Website Console</a></li>
                <li data-permission="PAGE_DEFCON_SERVERS"><a href="/defconservers" id="nav-defconservers"><i
                            class="fa-solid fa-server"></i>Dedcon Servers</a></li>
                <li data-permission="PAGE_RCON_CONSOLE"><a href="/rconconsole" id="nav-rcon"><i
                            class="fa-solid fa-terminal"></i>RCON Console</a></li>
            </ul>
        </div>
        <main>
            <div id="rcon-container">
                <div id="server-list-panel">
                    <div id="server-list-title">Server Presets</div>
                    <ul id="server-list">
                    </ul>
                </div>
                <div id="console-panel">
                    <div id="connection-panel">
                        <div id="connection-controls">
                            <button id="connect-btn">Connect</button>
                            <button id="disconnect-btn">Disconnect</button>
                            <div id="connection-status-container">
                                <span class="status-label">Status:</span>
                                <span id="connection-status" class="status-disconnected">Disconnected</span>
                            </div>
                        </div>
                        
                        <div class="log-streams-container">
                            <label>Log Streams:</label>
                            <input type="checkbox" id="stream-game-events" name="stream-game-events">
                            <label for="stream-game-events">Game Events</label>
                            <input type="checkbox" id="stream-server-log" name="stream-server-log" style="margin-left: 10px;">
                            <label for="stream-server-log">Server Log</label>
                        </div>
                        
                        <div id="connection-form">
                            <div class="form-row">
                                <label for="server">Server:</label>
                                <input type="text" id="server" placeholder="IP address or hostname">
                            </div>
                            <div class="form-row">
                                <label for="port">Port:</label>
                                <input type="number" id="port" placeholder="RCON port">
                            </div>
                            <div class="form-row">
                                <label for="password">Password:</label>
                                <input type="password" id="password" placeholder="RCON password">
                            </div>
                        </div>
                    </div>

                    <div id="console-output">
                    </div>

                    <div id="command-input">
                        <input type="text" id="command" placeholder="Enter command..." disabled>
                        <button id="send-btn" disabled>Send</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
