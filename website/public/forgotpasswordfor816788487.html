<!DOCTYPE html>
<html lang="en" class="hide-scrollbar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot password?</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/x-icon" href="https://defconexpanded.com/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="https://defconexpanded.com/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://defconexpanded.com/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="https://defconexpanded.com/favicon-96x96.png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://defconexpanded.com/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="https://defconexpanded.com/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="https://defconexpanded.com/android-chrome-512x512.png">
    <link rel="stylesheet" type="text/css" href="/css/newmain.css" />
    <link rel="stylesheet" type="text/css" href="/css/scaling.css" />
    <link rel="stylesheet" type="text/css" href="/css/useraccounts.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
    <script type="module" src="/javaScript/main/navbar.js" defer></script>
    <script type="module" src="/javaScript/main/main.js" defer></script>
    <style>
        .fa-user {
            margin-right: 5px;
        }

        .fa-cog {
            margin-right: 5px;
        }
    </style>
</head>

<body class="hide-scrollbar">
    <main>
        <div class="login-container">
            <form id="forgotPasswordForm" action="">
                <div class="headingsContainer">
                    <h3>Recover your password</h3>
                    <p>Enter your email and username so we can verify it's you</p>
                </div>

                <div class="mainContainer">
                    <label for="username">Your username</label>
                    <input type="text" id="username" placeholder="Enter Username" name="username" required>
                    <br><br>
                    <label for="email">Email address</label>
                    <input type="email" id="email" placeholder="Enter Email" name="email" required>
                    <br><br>
                    <button type="submit">Request Password Reset</button>
                    <p id="message"></p>
                </div>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message');

            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email })
                });

                const data = await response.json();
                if (response.ok) {
                    message.style.color = 'green';
                    message.textContent = 'A password reset link has been sent to your email.';
                } else {
                    message.style.color = 'red';
                    message.textContent = data.error;
                }
            } catch (error) {
                console.error('Error:', error);
                message.style.color = 'red';
                message.textContent = 'An error occurred. Please try again.';
            }
        });
    </script>
</body>

</html>
