<!doctype html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>DEFCON Replay Viewer</title>
  <style>
    body {
  margin: 0;
  padding: 0;
  background-color: black;
  font-family: 'Courier New', monospace;
  text-align: center;
  min-height: 100vh;
}

.canvas-container {
  display: inline-block;
  margin: 0 auto;
}

canvas {
  display: block;
  border: none;
  background-color: black;
  cursor: pointer;
}

    canvas:fullscreen {
      cursor: none;
    }

    canvas:-webkit-full-screen {
      cursor: none;
    }

    canvas:-moz-full-screen {
      cursor: none;
    }

    canvas:-ms-fullscreen {
      cursor: none;
    }

    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(0, 20, 40, 0.9) 0%, rgba(0, 10, 20, 0.95) 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    #loading-container {
      width: 300px;
      height: 295px;
      position: relative;
      background: linear-gradient(to right, rgba(25, 25, 49, 0.92) 0%, rgba(25, 25, 100, 0.92) 100%);
      border: 1px solid rgba(100, 100, 140, 0.86);
      box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.5);
    }

    #loading-title-bar {
      width: 291px;
      height: 20px;
      background: linear-gradient(to right, rgba(0, 0, 35, 0.86) 0%, rgba(255, 232, 155, 0.86) 100%);
      border-bottom: 1px solid rgba(0, 0, 0, 0.86);
      display: flex;
      align-items: center;
      padding-left: 10px;
    }

    #loading-title {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.55);
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #loading-invert-box {
      position: absolute;
      left: 10px;
      top: 30px;
      width: 280px;
      height: 250px;
      background: linear-gradient(to right, rgba(25, 30, 35, 0.57) 0%, rgba(5, 5, 15, 1.0) 100%);
      border-top: 1px solid rgba(0, 0, 0, 1.0);
      border-left: 1px solid rgba(0, 0, 0, 1.0);
      border-right: 1px solid rgba(140, 140, 175, 0.0);
      border-bottom: 1px solid rgba(140, 140, 175, 0.0);
    }

    #loading-content {
      margin-top: 20px;
      top: 50px;
      text-align: center;
    }

    #loading-status {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.9);
    }

    #progress-container {
      width: 240px;
      height: 20px;
      margin: 0 auto 40px auto;
      position: relative;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      transition: width 0.3s ease;
      background-color: #ffff00;
    }

    #progress-border {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 1px solid rgba(255, 255, 255, 0.9);
      pointer-events: none;
    }

    #loading-details {
      font-size: 16px;
      font-weight: bold;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    #progress-container-2 {
      width: 240px;
      height: 20px;
      margin: 0 auto 20px auto;
      position: relative;
    }

    #progress-bar-2 {
      height: 100%;
      width: 0%;
      transition: width 0.3s ease;
      background-color: #00ff00;
    }

    #progress-border-2 {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 1px solid rgba(255, 255, 255, 0.9);
      pointer-events: none;
    }

    #loading-info {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.9);
      margin-top: 10px;
      text-transform: uppercase;
    }



    .state-disconnected {
      color: #ff0000;
    }

    .state-connecting {
      color: #ffff00;
      animation: blink 1s infinite;
    }

    .state-connected {
      color: #00ff00;
    }

    @keyframes blink {

      0%,
      50% {
        opacity: 1;
      }

      51%,
      100% {
        opacity: 0.3;
      }
    }

    .hidden {
      display: none !important;
    }

    #loading-overlay,
    #loading-container {
      pointer-events: none;
    }
    
    #loading-content,
    #loading-content * {
      pointer-events: auto;
      outline: none !important;
    }
  </style>
</head>

<body>
  <div id="loading-overlay">
    <div id="loading-container">
      <div id="loading-title-bar">
        <div id="loading-title">CONNECTION STATUS</div>
      </div>
      <div id="loading-invert-box"></div>
      <div id="loading-content">
        <div id="loading-status" class="state-connecting">CONNECTING</div>
        <div id="progress-container">
          <div id="progress-bar"></div>
          <div id="progress-border"></div>
        </div>
        <div id="loading-details">DOWNLOADING</div>
        <div id="progress-container-2">
          <div id="progress-bar-2"></div>
          <div id="progress-border-2"></div>
        </div>
        <div id="loading-info">PREPARING SYSTEM...</div>
      </div>

    </div>
  </div>
      <div class="canvas-container">
      <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
    </div>

  <script type='text/javascript'>
    let originalSetTimeout = window.setTimeout;
    let originalClearTimeout = window.clearTimeout;
    let originalRequestAnimationFrame = window.requestAnimationFrame;
    let originalCancelAnimationFrame = window.cancelAnimationFrame;

    function createImmediateCallback(callback, args = []) {
      if (window.MessageChannel) {
        let channel = new MessageChannel();
        channel.port2.onmessage = function () {
          callback(...args);
        };
        channel.port1.postMessage(null);
        return;
      }

      if (window.postMessage) {
        let messageKey = 'immediate_callback_' + Math.random();
        function messageHandler(event) {
          if (event.data === messageKey) {
            window.removeEventListener('message', messageHandler);
            callback(...args);
          }
        }
        window.addEventListener('message', messageHandler);
        window.postMessage(messageKey, '*');
        return;
      }

      callback(...args);
    }

    window.setTimeout = function (callback, delay, ...args) {
      if (delay === 0 || delay === undefined || delay === null) {
        createImmediateCallback(callback, args);
        return Math.floor(Math.random() * 1000000);
      }
      return originalSetTimeout.call(window, callback, delay, ...args);
    };

    window.clearTimeout = function (id) {
      if (typeof id === 'number' && id < 1000000) {
        return originalClearTimeout.call(window, id);
      }
    };

    let rafIdCounter = 1000000;
    window.requestAnimationFrame = function (callback) {
      createImmediateCallback(callback, [performance.now()]);
      return rafIdCounter++;
    };

    window.cancelAnimationFrame = function (id) {
    };
    var canvasElement = document.getElementById('canvas');
    var isFullscreen = false;

    canvasElement.addEventListener('webglcontextlost', (e) => {
      alert('WebGL context lost. You will need to reload the page.');
      e.preventDefault();
    }, false);

    function onFullscreenChange() {
      isFullscreen = !!(document.fullscreenElement ||
        document.webkitFullscreenElement ||
        document.mozFullScreenElement ||
        document.msFullscreenElement);

      if (isFullscreen) {
        canvasElement.focus();
      } else {
        setTimeout(() => {
          canvasElement.focus();
          canvasElement.getBoundingClientRect();
          window.dispatchEvent(new Event('resize'));
        }, 100);
      }
    }

    document.addEventListener('fullscreenchange', onFullscreenChange);
    document.addEventListener('webkitfullscreenchange', onFullscreenChange);
    document.addEventListener('mozfullscreenchange', onFullscreenChange);
    document.addEventListener('MSFullscreenChange', onFullscreenChange);

    canvasElement.addEventListener('click', function (e) {
      if (!isFullscreen) {
        var requestFullscreen = canvasElement.requestFullscreen ||
          canvasElement.webkitRequestFullscreen ||
          canvasElement.mozRequestFullScreen ||
          canvasElement.msRequestFullscreen;

        if (requestFullscreen) {
          requestFullscreen.call(canvasElement);
        }
      }

      e.preventDefault();
      return false;
    });

    canvasElement.addEventListener('mousedown', function (e) {
      canvasElement.focus();
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && isFullscreen) {
        var exitFullscreen = document.exitFullscreen ||
          document.webkitExitFullscreen ||
          document.mozCancelFullScreen ||
          document.msExitFullscreen;

        if (exitFullscreen) {
          exitFullscreen.call(document);
        }
      }
    });

    var DefconLoader = {
      overlay: document.getElementById('loading-overlay'),
      statusElement: document.getElementById('loading-status'),
      progressBar: document.getElementById('progress-bar'),
      progressBar2: document.getElementById('progress-bar-2'),
      detailsElement: document.getElementById('loading-details'),
      infoElement: document.getElementById('loading-info'),
      STATE_DISCONNECTED: 0,
      STATE_CONNECTING: 1,
      STATE_CONNECTED: 2,
      currentState: 1,
      maxUpdatesRemaining: 0,
      stage: 0,
      stageStartTime: null,

      init: function () {
        this.setConnectionState(this.STATE_CONNECTING);
        this.infoElement.textContent = 'ESTABLISHING CONNECTION...';
      },

      setConnectionState: function (state) {
        this.currentState = state;
        const statusEl = this.statusElement;

        switch (state) {
          case this.STATE_DISCONNECTED:
            statusEl.textContent = 'DISCONNECTED';
            statusEl.className = 'state-disconnected';
            this.updateProgressBar(0, '#ff0000');
            break;

          case this.STATE_CONNECTING:
            statusEl.textContent = 'CONNECTING';
            statusEl.className = 'state-connecting';
            this.updateProgressBar(50, '#ffff00');
            break;

          case this.STATE_CONNECTED:
            statusEl.textContent = 'CONNECTED';
            statusEl.className = 'state-connected';
            this.updateProgressBar(100, '#00ff00');
            break;
        }
      },

      updateProgressBar: function (percent, color) {
        if (this.progressBar) {
          this.progressBar.style.width = percent + '%';
          this.progressBar.style.backgroundColor = color;
        }
      },

      updateSecondaryProgress: function (percent, color, text) {
        if (this.progressBar2) {
          this.progressBar2.style.width = percent + '%';
          this.progressBar2.style.backgroundColor = color;
        }
        if (text && this.detailsElement) {
          this.detailsElement.textContent = text;
        }
      },

      updateSyncStatus: function (remaining, maxRemaining) {
        if (remaining > maxRemaining) {
          this.maxUpdatesRemaining = remaining;
        }

        let fraction = 0;
        if (this.maxUpdatesRemaining > 0) {
          fraction = remaining / this.maxUpdatesRemaining;
        }
        fraction = Math.max(0, Math.min(1, 1 - fraction));

        const red = Math.floor((1 - fraction) * 255);
        const green = Math.floor(fraction * 255);
        const color = `rgb(${red}, ${green}, 0)`;
        const text = remaining > 5 ? 'RECEIVING' : 'RECEIVED';
        this.updateSecondaryProgress(fraction * 100, color, text);
      },

      hide: function () {
        if (this.overlay) {
          this.overlay.classList.add('hidden');
        }
      }
    };

    var Module = {
      canvas: canvasElement,
      setStatus(text) {
        if (text) {
          DefconLoader.infoElement.textContent = text.toUpperCase();
        }
      },
      totalDependencies: 0,
      monitorRunDependencies(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);

        if (left > 0) {
          DefconLoader.setConnectionState(DefconLoader.STATE_CONNECTING);
          DefconLoader.updateSyncStatus(left, this.totalDependencies);
          DefconLoader.infoElement.textContent = `DOWNLOADING... (${this.totalDependencies - left}/${this.totalDependencies})`;

          const connectProgress = 50 + (((this.totalDependencies - left) / this.totalDependencies) * 50);
          DefconLoader.updateProgressBar(connectProgress, '#ffff00');

        } else {
          DefconLoader.setConnectionState(DefconLoader.STATE_CONNECTED);
          DefconLoader.updateSecondaryProgress(100, '#00ff00', 'SYNCHRONISED');
          DefconLoader.infoElement.textContent = 'ALL DOWNLOADS COMPLETE';

          setTimeout(() => {
            DefconLoader.hide();
          }, 1500);
        }
      },
      requestFullscreen: function (lockPointer, resizeCanvas) {
        if (!isFullscreen) {
          var requestFullscreen = canvasElement.requestFullscreen ||
            canvasElement.webkitRequestFullscreen ||
            canvasElement.mozRequestFullScreen ||
            canvasElement.msRequestFullscreen;

          if (requestFullscreen) {
            requestFullscreen.call(canvasElement);
          }
        }
      }
    };

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('replay-viewer-service-worker.js', {
        scope: './'
      }).then(registration => {
        registration.update();
        
        if (registration.waiting) {
          registration.waiting.postMessage({ type: 'SKIP_WAITING' });
        }
        
        registration.addEventListener('updatefound', () => {
          const newWorker = registration.installing;
          
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed') {
              if (navigator.serviceWorker.controller) {
                newWorker.postMessage({ type: 'SKIP_WAITING' });
              }
            }
          });
        });
        
        setInterval(() => {
          registration.update().catch(err => {
          });
        }, 30000);
        
      }).catch(error => {
        throw error;
      });
    }

    DefconLoader.init();

    Module.setStatus('Initializing...');

    window.onerror = (event) => {
      DefconLoader.setConnectionState(DefconLoader.STATE_DISCONNECTED);
      DefconLoader.infoElement.textContent = 'CONNECTION FAILED - CHECK CONSOLE';
      DefconLoader.detailsElement.textContent = 'ERROR';
      Module.setStatus('Exception thrown, see JavaScript console');
      Module.setStatus = (text) => {
        if (text) {
          throw new Error(text);
        }
      };
    };

    window.addEventListener('load', function () {
      canvasElement.focus();
    });

    setTimeout(() => {
      if (DefconLoader.overlay && !DefconLoader.overlay.classList.contains('hidden')) {
        DefconLoader.infoElement.textContent = 'ESTABLISHING SECURE CONNECTION...';
      }
    }, 500);
  </script>
  <script async type="text/javascript" src="replay_viewer_A1.99.js"></script>
</body>

</html>
