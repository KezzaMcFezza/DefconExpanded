<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dedcon RCON Console</title>
    <link rel="stylesheet" href="main.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Dedcon RCON Console</h1>
            <p>Remote administration tool for Dedcon servers</p>
        </header>

        <div id="rcon-container">
            <!-- Connection Panel -->
            <div id="connection-panel">
                <h2>Server Connection</h2>
                <div class="form-row">
                    <label for="server">Server:</label>
                    <input type="text" id="server" placeholder="IP address or hostname">
                </div>
                <div class="form-row">
                    <label for="port">Port:</label>
                    <input type="number" id="port" placeholder="RCON port (default: 8800)">
                </div>
                <div class="form-row">
                    <label for="password">Password:</label>
                    <input type="password" id="password" placeholder="RCON password">
                </div>
                <div class="form-row">
                    <label></label>
                    <button id="connect-btn">Connect</button>
                    <button id="disconnect-btn" disabled>Disconnect</button>
                </div>
                <div class="form-row">
                    <label>Status:</label>
                    <span id="connection-status" class="status-disconnected">Disconnected</span>
                </div>
            </div>

            <!-- Console Output -->
            <div id="console-output">
                Welcome to the Dedcon RCON Console.
                Connect to a Dedcon server using the form above.
            </div>

            <!-- Command Input -->
            <div id="command-input">
                <input type="text" id="command" placeholder="Enter command..." disabled>
                <button id="send-btn" disabled>Send</button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>

</html>
