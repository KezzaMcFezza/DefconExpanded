<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dedcon RCON Console</title>
    <script src="index.js"></script>
    <link rel="stylesheet" href="main.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&family=Consolas:wght@400&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>Dedcon RCON Console</h1>
            <p>Remote administration tool for Dedcon servers</p>
        </header>

        <div id="rcon-container">
            <div id="console-panel">
                <div id="connection-panel">
                    <div id="connection-controls">
                        <button id="connect-btn">Connect</button>
                        <button id="disconnect-btn" disabled>Disconnect</button>
                        <div id="connection-status-container">
                            <span class="status-label">Status:</span>
                            <span id="connection-status" class="status-disconnected">Disconnected</span>
                        </div>
                    </div>

                    <div class="log-streams-container">
                        <label>Log Streams:</label>
                        <input type="checkbox" id="stream-game-events" name="stream-game-events" style="margin-right: 5px;">
                        <label for="stream-game-events">Game Events</label>
                        <input type="checkbox" id="stream-server-log" name="stream-server-log" style="margin-right: 5px;">
                        <label for="stream-server-log">Server Log</label>
                    </div>

                    <div id="connection-form">
                        <div class="form-row">
                            <label for="server">Server:</label>
                            <input type="text" id="server" placeholder="IP address or hostname">
                        </div>
                        <div class="form-row">
                            <label for="port">Port:</label>
                            <input type="number" id="port" placeholder="RCON port (default: 8800)">
                        </div>
                        <div class="form-row">
                            <label for="password">Password:</label>
                            <input type="password" id="password" placeholder="RCON password">
                        </div>
                    </div>
                </div>

                <div id="console-output">
                </div>

                <div id="command-input">
                    <input type="text" id="command" placeholder="Enter command..." disabled>
                    <button id="send-btn" disabled>Send</button>
                </div>
            </div>
        </div>

        <footer>
            <p>DefconExpanded RCON Framework 2025</p>
        </footer>
    </div>
</body>

</html>
